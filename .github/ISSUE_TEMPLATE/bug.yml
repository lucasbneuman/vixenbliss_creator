name: Bug
description: Report a bug without turning the repo into the primary bug tracker.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and briefly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: What are the minimum steps to reproduce it?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: tracker
    attributes:
      label: External Tracker ID
      description: Preferred when the main tracker is YouTrack.
      placeholder: DEV-456
